name: Wiki Maintenance

# 【可选的云端链路 · 非硬依赖】
#
# 本 workflow 仅在用户手动触发时运行。
# - 本地链路（推荐）：在 Claude Code 终端直接运行 /skill <name>，无需任何 GitHub 配置
# - 云端链路（可选）：想让 GitHub Actions 代跑 audit / converge / learn 时，在仓库
#   Settings → Secrets 中配置 ANTHROPIC_API_KEY，然后 workflow_dispatch 手动触发
#
# 刻意不配置定时 cron —— 避免未配 secret 的仓库出现红色失败告警。
# 若你有明确的定时诉求（例如每周 audit 报告），自行取消下方 schedule 注释即可。
#
# on:
#   schedule:
#     - cron: '0 2 * * 1'    # 每周一 UTC 02:00
on:
  workflow_dispatch:
    inputs:
      task:
        description: '运行哪个 skill'
        required: true
        type: choice
        default: audit
        options:
          - audit
          - converge
          - learn
      reason:
        description: '触发原因（可选，会记录在 commit 信息中）'
        required: false
        type: string
        default: ''

# 需要写回仓库的权限
permissions:
  contents: write

jobs:
  run:
    name: Run /skill ${{ github.event.inputs.task }}
    runs-on: ubuntu-latest
    concurrency:
      group: wiki-maintenance
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 运行指定 Skill ────────────────────────────────────────
      #
      # 任务分派：
      #   - audit：定时默认任务，纯读 wiki 出报告（不改文件）
      #   - converge：处理 [待收敛] 矛盾（修改 wiki/ + persona.md）
      #   - learn：手动触发时使用；云端无 MCP，相当于只做 persona refresh
      #
      # 前置条件：
      #   - 仓库 Settings → Secrets 中配置 ANTHROPIC_API_KEY
      #
      # 注意：小红书 MCP（localhost:18060）是本地 Playwright 服务，
      # 无法在 GitHub Actions 运行。需要真实抓取素材请在本地
      # 运行 /skill learn，再手动推送 raw/。
      #
      - name: Run Skill
        uses: anthropics/claude-code-action@beta
        with:
          prompt: |
            You are running a maintenance task for Self-Media-Agent
            (a photographer persona knowledge base).

            Context:
              Repository: Self-Media-Agent
              Trigger:    manual — task=${{ github.event.inputs.task }}, reason=${{ github.event.inputs.reason || 'none' }}
              Task:       ${{ github.event.inputs.task }}

            Instructions by task:
              audit:
                1. Read `prompts/audit.md` for the full skill instructions
                2. Read `schema/update-rules.md` (authoritative rules) and `schema/dimensions.md` (for Gate 3 attribution)
                3. Execute the audit and print the report to job output
                4. Do NOT modify wiki/ or raw/ or state/
                   (audit is read-only — any findings are reported, not auto-fixed)

              converge:
                1. Read `prompts/converge.md` for the full skill instructions
                2. Read `schema/update-rules.md` and `schema/dimensions.md`
                3. Execute the convergence workflow on all [待收敛] entries
                4. Rewrite `wiki/persona.md` per Step 9 of update-rules

              learn:
                1. Read `prompts/learn.md` for the full skill instructions
                2. Read `schema/update-rules.md` (authoritative rules)
                3. MCP is NOT available in this environment —
                   skip Steps 2–3 (fetch), go directly to Step 9 (rewrite persona.md)
                4. Append a run record to state/last_run.json `runs[]`

            After completion, the workflow will commit any file changes.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

      # ── 提交变更（仅 converge / learn 会产生变更；audit 是只读的）──
      - name: Commit changes
        run: |
          git config user.name  "Self-Media-Agent Bot"
          git config user.email "bot@self-media-agent.local"

          # audit 是纯读操作，不写文件；converge / learn 会改 wiki/ + state/
          git add wiki/ state/ raw/

          if git diff --staged --quiet; then
            echo "No changes — nothing to commit (expected for audit runs)."
          else
            TASK="${{ github.event.inputs.task }}"
            DATE=$(date -u +%Y-%m-%d)
            REASON="${{ github.event.inputs.reason }}"
            MSG="chore(${TASK}): ${DATE} — manual${REASON:+ (${REASON})}"

            git commit -m "$MSG"
            git push
            echo "Changes committed and pushed."
          fi
